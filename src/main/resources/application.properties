spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sparkle_accounting}?createDatabaseIfNotExist=true&useSSL=${DB_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:sparkle}
spring.datasource.password=${DB_PASSWORD:sparkle}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true
server.port=${SERVER_PORT:8085}
api_token=${ADDRESS_API_TOKEN:change-me}
user_email=${ADDRESS_API_EMAIL:change-me@example.com}
address.api.url=${ADDRESS_API_URL:https://www.universal-tutorial.com/api}





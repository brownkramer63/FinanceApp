version: "3.9"

services:
  app:
    container_name: sparkle-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8085}:8085"
    environment:
      SERVER_PORT: 8085
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-sparkle_accounting}
      DB_USERNAME: ${DB_USERNAME:-sparkle}
      DB_PASSWORD: ${DB_PASSWORD:-sparkle123}
      DB_SSL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: never
      ADDRESS_API_TOKEN: ${ADDRESS_API_TOKEN:-change-me}
      ADDRESS_API_EMAIL: ${ADDRESS_API_EMAIL:-change-me@example.com}
      ADDRESS_API_URL: ${ADDRESS_API_URL:-https://www.universal-tutorial.com/api}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sparkle-network

  mysql:
    image: mysql:8.4
    container_name: sparkle-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-sparkle_accounting}
      MYSQL_USER: ${DB_USERNAME:-sparkle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sparkle123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    command: --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - sparkle-network

networks:
  sparkle-network:

volumes:
  mysql-data:


















